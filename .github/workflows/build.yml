name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The ESP-IDF CI action supplies its own pinned IDF, so we don't need the
      # heavy esp-idf submodule here.
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build (esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          # Docker image tag (hyphen, not slash) — matches the esp-idf submodule.
          esp_idf_version: release-v5.4
          target: esp32s3
          path: '.'
